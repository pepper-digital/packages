name: Build Satis

on:
  repository_dispatch:
    types: [rebuild]
  workflow_dispatch:
  schedule:
    # Safety-net nightly rebuild at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Satis
        run: composer global require composer/satis:@dev --no-interaction --quiet --stability=dev

      - name: Build Satis
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: $(composer global config bin-dir --absolute)/satis build satis.json public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
