name: Build Satis

on:
  repository_dispatch:
    types: [rebuild]
  workflow_dispatch:
  schedule:
    # Safety-net nightly rebuild at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Satis
        run: |
          composer global config minimum-stability dev
          composer global config prefer-stable true
          composer global config --no-plugins allow-plugins.composer/satis true
          composer global require composer/satis --no-interaction --quiet

      - name: Build Satis
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
          # Throttle parallel API calls so GitHub's anti-scraping limit doesn't trip
          COMPOSER_MAX_PARALLEL_HTTP: 2
        run: |
          # Retry with backoff — GitHub's secondary rate limit is transient
          satis="$(composer global config bin-dir --absolute)/satis"
          for i in 1 2 3; do
            "$satis" build satis.json public/ && exit 0
            echo "Attempt $i failed (likely GitHub API throttle), backing off..."
            sleep 60
          done
          echo "All attempts failed."; exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
